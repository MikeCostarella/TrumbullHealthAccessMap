name: Deploy React app to GitHub Pages

# Builds the Vite app in react-app/ and publishes its dist/ to GitHub Pages.
# The existing Latest/ folder is left untouched — only react-app's build
# output is deployed.

on:
  push:
    branches: [main]
    # Only rebuild when something in react-app changes (or this workflow).
    paths:
      - "react-app/**"
      - ".github/workflows/deploy.yml"
  # Allow manual runs from the Actions tab.
  workflow_dispatch:

# Permissions required by the official Pages deploy actions.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; cancel in-progress runs on new pushes.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: react-app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: react-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: SPA fallback (404 -> index.html)
        run: cp dist/index.html dist/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: react-app/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
